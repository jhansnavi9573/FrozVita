<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FrozVita</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #d9f3ff, #c8f0f7);
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
      background: #ffffffcc;
      backdrop-filter: blur(10px);
      position: relative;
    }

    /* LEFT MENU */
    .nav-left a {
      margin-right: 20px;
      text-decoration: none;
      color: #003f5c;
      font-weight: 500;
    }

    /* CENTER LOGO */
    .nav-center {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .logo {
      width: 60px;
      border-radius: 50%;
    }

    /* RIGHT ICONS */
    .nav-right span {
      margin-left: 15px;
      font-size: 18px;
      cursor: pointer;
    }

    /* HERO SECTION */
    .hero {
      height: 90vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .hero h1 {
      font-size: 40px;
      color: #003f5c;
      margin: 20px 0 10px;
    }

    .hero p {
      font-size: 20px;
      color: #333;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      background: #00bcd4;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    .btn:hover {
      background: #0097a7;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">

    <!-- LEFT -->
    <div class="nav-left">
      <a href="#">Home</a>
      <a href="#">Trending</a>
      <a href="#">Shop</a>
      <a href="#">Contact</a>
    </div>

    <!-- CENTER LOGO -->
    <div class="nav-center">
      <img src="logo.png" class="logo">
    </div>

    <!-- RIGHT -->
    <div class="nav-right">
      <span>🔍</span>
      <span>👤</span>
      <span>❤️</span>
      <span>🛒</span>
    </div>

  </div>

  <!-- HERO -->
  <div class="hero">
    <h1>FrozVita 🧊</h1>
    <p>Engineered to Refresh!</p>
    <button class="btn">Order Now</button>
  </div>

</body>
</html>
