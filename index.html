<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FrozVita</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #d9f3ff, #c8f0f7);
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
      background: rgba(255,255,255,0.3);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-left a {
      margin-right: 25px;
      text-decoration: none;
      color: #003f5c;
      font-weight: 500;
    }

    /* CENTER LOGO */
    .nav-center {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .logo {
      width: 180px;
      height: auto;
    }

    /* BUTTONS RIGHT */
    .nav-right button {
      margin-left: 10px;
    }

    /* BUTTON STYLES */
    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      transition: 0.3s;
    }

    .login-btn {
      background: transparent;
      border: 1px solid #003f5c;
      color: #003f5c;
    }

    .login-btn:hover {
      background: #003f5c;
      color: white;
    }

    .signup-btn {
      background: #00bcd4;
      color: white;
    }

    .signup-btn:hover {
      background: #0097a7;
    }

    /* HERO */
    .hero {
      height: 90vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .hero h1 {
  font-size: 50px;
  color: #003f5c;
  margin-bottom: 5px;   /* reduce space below */
}

    .hero p {
      font-size: 22px;
      color: #333;
    }

    .order-btn {
      margin-top: 25px;
      padding: 14px 30px;
      background: #00bcd4;
      color: white;
      border-radius: 10px;
      font-size: 18px;
      border: none;
      cursor: pointer;
    }

    .order-btn:hover {
      background: #0097a7;
    }

    /* PRODUCTS */
    .products {
      padding: 60px 40px;
      text-align: center;
    }

    .product-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      width: 220px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {

  /* NAVBAR FIX */
  .navbar {
    flex-direction: column;
    padding: 10px;
  }

  .nav-left {
    display: none; /* hide menu on mobile */
  }

  .nav-center {
    position: static;
    transform: none;
    margin: 10px 0;
  }

  .nav-right {
    display: flex;
    gap: 10px;
  }

  /* LOGO FIX */
  .logo {
    width: 120px;
  }

  /* HERO TEXT FIX */
  .hero h1 {
    font-size: 30px;
  }

  .hero p {
    font-size: 18px;
  }

  /* BUTTON FIX */
  .order-btn {
    width: 70%;
    padding: 12px;
    font-size: 16px;
    white-space: nowrap; /* prevents breaking */
  }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">

    <div class="nav-left">
      <a href="#">Home</a>
      <a href="#">Trending</a>
      <a href="#">Shop</a>
      <a href="#">Contact</a>
    </div>

    <div class="nav-center">
      <img src="logo.png" class="logo">
    </div>

    <div class="nav-right">
      <button class="btn login-btn">Login</button>
      <button class="btn signup-btn">Sign Up</button>
    </div>

  </div>

  <!-- HERO -->
  <div class="hero">
    <h1>FrozVita 🧊</h1>
    <p>Engineered to Refresh!</p>

    <!-- WHATSAPP BUTTON -->
    <a href="https://wa.me/91XXXXXXXXXX" target="_blank">
      <button class="order-btn">Order Now</button>
    </a>
  </div>

  <!-- PRODUCTS -->
  <div class="products">
    <h2>Our Products</h2>

    <div class="product-container">

      <div class="card">
        <h3>Flavored Ice Cubes</h3>
        <p>Fresh & tasty cubes</p>
      </div>

      <div class="card">
        <h3>Liquid Packs</h3>
        <p>Freeze & enjoy</p>
      </div>

      <div class="card">
        <h3>Custom Orders</h3>
        <p>As per your need</p>
      </div>

    </div>
  </div>

</body>
</html>
