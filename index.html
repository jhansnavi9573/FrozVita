<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FrozVita</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #d9f3ff, #c8f0f7);
    }

    /* Navbar */
    .navbar {
      position: absolute;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      z-index: 10;
    }

    .logo-text {
      font-size: 22px;
      font-weight: bold;
      color: #003f5c; /* Dark color */
    }

    .nav-buttons button {
      margin-left: 10px;
      padding: 8px 16px;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    .login {
      background: transparent;
      color: #222;
      border: 1px solid #222;
    }

    .signup {
      background: #00bcd4;
      color: white;
    }

    /* Hero Section */
    .hero {
  height: 100vh;
  background-color: #9AB57B;
  background-image: url('logo.png');
  background-repeat: no-repeat;
  background-position: center;
  background-size: contain;
}

  </style>
</head>

<body>

  <!-- Navbar -->
  <div class="navbar">
    <div class="logo-text">
      FrozVita: Engineered to Refresh!
    </div>

    <div class="nav-buttons">
      <button class="login">Login</button>
      <button class="signup">Sign Up</button>
    </div>
  </div>

  <!-- Background Logo -->
  <div class="hero"></div>

</body>
</html>
