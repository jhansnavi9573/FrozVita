<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FrozVita</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(to right, #d9f3ff, #c8f0f7);
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 40px;
  background: rgba(255,255,255,0.3);
  backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
}

.nav-left {
  display: flex;
  gap: 20px;
  align-items: center;
}

.nav-left a {
  text-decoration: none;
  color: #003f5c;
  font-weight: 500;
}

/* CONTACT */
.contact-box {
  display: flex;
  align-items: center;
  gap: 5px;
  cursor: pointer;
  position: relative;
  color: #003f5c;
}

@media (max-width:768px){

  #contact-details {
    position: fixed;          /* 🔥 key change */
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;            /* full screen */
    
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    background: #e6f7f5;      /* nice color */
    border-radius: 0;
    z-index: 999;
  }

  .contact-item {
    font-size: 18px;
    margin: 15px 0;
  }

}



.contact-item a {
  text-decoration: none;
  color: #003f5c;
}

.contact-item a:hover {
  text-decoration: underline;
}

/* LOGO */
.nav-center {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

.logo {
  width: 180px;
}

/* BUTTONS */
.btn {
  padding: 10px 20px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.login-btn {
  border: 1px solid #003f5c;
  background: transparent;
}

.signup-btn {
  background: #00bcd4;
  color: white;
}

/* HERO */
.hero {
  height: 90vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.hero h1 {
  margin-bottom: 5px;
}

.hero p {
  margin-top: 5px;
}

/* ORDER BUTTON */
.order-btn {
  margin-top: 20px;
  padding: 10px 35px;
  min-width: 160px;
  background: #00bcd4;
  color: black;
  border-radius: 10px;
  white-space: nowrap;
}

/* MOBILE */
@media (max-width: 768px) {

  /* NAVBAR FIX */
  .navbar {
    flex-direction: column;
    align-items: center;
    padding: 10px;
  }

  .nav-left {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 15px;
  }

  .nav-center {
    position: static;   /* remove overlap */
    transform: none;
    margin: 10px 0;
  }

  .logo {
    width: 120px;   /* smaller logo */
  }

  .nav-right {
    display: flex;
    gap: 10px;
    margin-top: 10px;
  }

  /* HERO FIX */
  .hero {
    padding: 20px;
    text-align: center;
  }

  .hero h1 {
    font-size: 28px;
  }

  .hero p {
    font-size: 16px;
  }

  /* BUTTON FIX */
  .order-btn {
    width: 70%;
    padding: 12px;
    font-size: 16px;
  }

}
</style>
</head>

<body>

<div class="navbar">

<div class="nav-left">
  <a href="#">Home</a>
  <a href="#">Trending</a>

  <div class="contact-box" onclick="toggleContact()">
    Contact <span id="arrow">⌄</span>

    <div id="contact-details">

      <div class="contact-item">
        📞 <a href="tel:+919573970422">+91 9573970422</a>
      </div>

      <div class="contact-item">
        💬 <a href="sms:+919573970422">SMS</a>
      </div>

      <div class="contact-item">
        📧 <a href="mailto:frozvita@gmail.com">frozvita@gmail.com</a>
      </div>

      <div class="contact-item">
        🟢 <a href="https://wa.me/919573970422">WhatsApp</a>
      </div>

      <div class="contact-item">
        📷 <a href="https://instagram.com/frozvita">frozvita</a>
      </div>

      <div class="contact-item">
        ☎️ <a href="tel:1800123456">1800-123-456</a>
      </div>

    </div>
  </div>
</div>

<div class="nav-center">
  <img src="logo.png" class="logo">
</div>

<div class="nav-right">
  <button class="btn login-btn">Login</button>
  <button class="btn signup-btn">Sign Up</button>
</div>

</div>

<div class="hero">
  <h1>FrozVita 🧊</h1>
  <p>Engineered to Refresh!</p>

  <a href="https://wa.me/919573970422">
    <button class="order-btn">Order Now</button>
  </a>
</div>

<script>
function toggleContact() {
  var x = document.getElementById("contact-details");
  var arrow = document.getElementById("arrow");

  if (x.style.display === "none" || x.style.display === "") {
    x.style.display = "block";
    arrow.innerHTML = "^";
  } else {
    x.style.display = "none";
    arrow.innerHTML = "⌄";
  }
}
</script>

</body>
</html>
