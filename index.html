<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FrozVita</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #d9f3ff, #c8f0f7);
    }

    /* Navbar */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      z-index: 100;
    }

    .logo-text {
      font-size: 20px;
      font-weight: bold;
      color: #003f5c;
    }

    .nav-buttons button {
      margin-left: 10px;
      padding: 8px 16px;
      border-radius: 5px;
      cursor: pointer;
      border: none;
    }

    .login {
      background: transparent;
      border: 1px solid #003f5c;
      color: #003f5c;
    }

    .signup {
      background: #00bcd4;
      color: white;
    }

    /* Hero Section */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding-top: 60px;
    }

    .hero img {
      width: 200px;
      filter: drop-shadow(0px 5px 10px rgba(0,0,0,0.2));
    }

    .hero h1 {
      margin: 20px 0 10px;
      font-size: 40px;
      color: #003f5c;
    }

    .hero p {
      font-size: 20px;
      color: #333;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      background: #00bcd4;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    .btn:hover {
      background: #0097a7;
    }

  </style>
</head>

<body>

  <!-- Navbar -->
  <div class="navbar">
    <div class="logo-text">
      FrozVita: Engineered to Refresh!
    </div>

    <div class="nav-buttons">
      <button class="login">Login</button>
      <button class="signup">Sign Up</button>
    </div>
  </div>

  <!-- Hero Section -->
  <div class="hero">
    <img src="logo.png" alt="FrozVita Logo">

    <h1>FrozVita 🧊</h1>
    <p>Engineered to Refresh!</p>

    <button class="btn">Order Now</button>
  </div>

</body>
</html>
